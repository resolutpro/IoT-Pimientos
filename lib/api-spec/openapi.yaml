openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sensors
    description: Sensor management
  - name: readings
    description: Sensor readings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sensors:
    get:
      operationId: listSensors
      tags: [sensors]
      summary: List all sensors
      responses:
        "200":
          description: List of sensors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sensor"

  /sensors/summary:
    get:
      operationId: getSensorsSummary
      tags: [sensors]
      summary: Get all sensors with latest reading and computed status
      responses:
        "200":
          description: Sensor summary list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorSummary"

  /sensors/{id}:
    get:
      operationId: getSensor
      tags: [sensors]
      summary: Get a single sensor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sensor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sensor"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sensors/{id}/readings:
    get:
      operationId: getSensorReadings
      tags: [readings]
      summary: Get readings for a sensor in a given time range
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [24h, 7d]
          description: Time range — 24h (default) or 7d
      responses:
        "200":
          description: List of readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reading"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Sensor:
      type: object
      properties:
        id_sensor:
          type: string
        nombre_zona:
          type: string
        tipo:
          type: string
        umbral_humedad_min:
          type: number
        umbral_humedad_max:
          type: number
        umbral_ec_max:
          type: number
        created_at:
          type: string
          format: date-time
      required:
        - id_sensor
        - nombre_zona
        - tipo
        - umbral_humedad_min
        - umbral_humedad_max
        - umbral_ec_max
        - created_at

    SensorInput:
      type: object
      properties:
        id_sensor:
          type: string
        nombre_zona:
          type: string
        umbral_humedad_min:
          type: number
        umbral_humedad_max:
          type: number
        umbral_ec_max:
          type: number
      required:
        - id_sensor
        - nombre_zona
        - umbral_humedad_min
        - umbral_humedad_max
        - umbral_ec_max

    SensorUpdate:
      type: object
      properties:
        nombre_zona:
          type: string
        umbral_humedad_min:
          type: number
        umbral_humedad_max:
          type: number
        umbral_ec_max:
          type: number

    Reading:
      type: object
      properties:
        id:
          type: integer
        sensor_id:
          type: string
        timestamp:
          type: string
          format: date-time
        humedad:
          type: number
          nullable: true
        temperatura:
          type: number
          nullable: true
        ec:
          type: number
          nullable: true
        bateria:
          type: number
          nullable: true
        senal:
          type: number
          nullable: true
      required:
        - id
        - sensor_id
        - timestamp

    SensorSummary:
      type: object
      properties:
        sensor:
          $ref: "#/components/schemas/Sensor"
        latestReading:
          $ref: "#/components/schemas/Reading"
          nullable: true
        status:
          type: string
          enum: [ok, warning, critical, unknown]
        alerts:
          type: array
          items:
            type: string
      required:
        - sensor
        - status
        - alerts

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
